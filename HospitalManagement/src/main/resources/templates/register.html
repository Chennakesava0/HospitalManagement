<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hospital Management System - Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #f4f7fc;
        }

        /* Top Header */
        .top-bar {
            background: #0d6efd;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .sub-text {
            font-size: 13px;
            opacity: 0.9;
        }

        /* Card */
        .card {
            border: none;
            border-radius: 12px;
        }

        .form-control, .form-select {
            border-radius: 8px;
            padding: 10px;
        }

        .btn-custom {
            background: #0d6efd;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-weight: 500;
        }

        .btn-custom:hover {
            background: #0b5ed7;
        }

        .icon {
            color: #0d6efd;
        }

        .footer-text {
            font-size: 13px;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="top-bar">
    🏥 Hospital Management System
    <div class="sub-text">Patient | Doctor | Admin Portal</div>
</div>

<!-- FORM CONTAINER -->
<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6 col-lg-5">

            <div class="card shadow p-4">

                <h4 class="text-center mb-1">
                    <i class="bi bi-person-plus-fill icon"></i> Create Account
                </h4>

                <p class="text-center text-muted mb-4">
                    Register to access hospital services
                </p>

                <form th:action="@{/saveUser}" th:object="${user}" method="post">

                    <!-- Username -->
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" th:field="*{username}" class="form-control" placeholder="Enter username" required>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="Enter email" required>
                    </div>

                    <!-- Phone -->
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" th:field="*{phoneNo}" class="form-control" placeholder="Enter phone number">
                    </div>

                    <!-- Gender -->
                    <div class="mb-3">
                        <label class="form-label">Gender</label>
                        <select th:field="*{gender}" class="form-select">
                            <option value="">Select Gender</option>
                            <option value="MALE">Male</option>
                            <option value="FEMALE">Female</option>
                        </select>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" th:field="*{password}" class="form-control" placeholder="Enter password" required>
                    </div>

                    <!-- Role -->
                    <div class="mb-4">
                        <label class="form-label">Register As</label>
                        <select th:field="*{role}" class="form-select">
                            <option value="">Select Role</option>
                            <option value="PATIENT">Patient</option>
                            <option value="DOCTOR">Doctor</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>

                    <!-- Button -->
                    <button class="btn btn-custom text-white w-100">
                        Register
                    </button>

                </form>

                <p class="text-center mt-3 footer-text">
                    Already registered?
                    <a href="/login">Login here</a>
                </p>

            </div>

        </div>

    </div>

</div>

</body>
</html>
