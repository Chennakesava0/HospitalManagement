<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Prescriptions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f4f7fc; }

        .card {
            border-radius: 15px;
        }

        .table th {
            background-color: #212529;
            color: white;
        }

        .badge {
            font-size: 12px;
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fs-4">🏥 Hospital Management System</span>
</nav>

<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
    <a href="/dashboard" class="btn btn-secondary mb-3">⬅ Back to Dashboard</a>
        <h3 class="fw-bold">Prescription List</h3>
        <a href="/prescriptions/add" class="btn btn-primary">
            + Add Prescription
        </a>
    </div>

    <!-- Table -->
    <div class="card shadow p-3">
        <div class="table-responsive">

            <table class="table table-hover text-center align-middle">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Medicines</th>
                        <th>Notes</th>
                        <th>Date</th>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="p : ${prescriptions}">
                        <td th:text="${p.id}"></td>

                        <td>
                            <span class="badge bg-success"
                                  th:text="${p.medicines}"></span>
                        </td>

                        <td th:text="${p.notes}"></td>

                        <td th:text="${p.appointment.date}"></td>
                        <td th:text="${p.appointment.patient.name}"></td>
                        <td th:text="${p.appointment.doctor.name}"></td>

                        <td>
                            <a th:href="@{/prescriptions/delete/{id}(id=${p.id})}"
                               class="btn btn-danger btn-sm">
                               Delete
                            </a>
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
