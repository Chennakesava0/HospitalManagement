<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Prescriptions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a href="/dashboard" class="navbar-brand">🏥 HMS</a>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h3>Prescription List</h3>
        <a href="/prescriptions/add" class="btn btn-info">+ Add Prescription</a>
    </div>

    <div class="card shadow p-3">
        <table class="table table-hover text-center">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Medicines</th>
                    <th>Notes</th>
                    <th>Appointment Date</th>
                    <th>Patient</th>
                    <th>Doctor</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="p : ${prescriptions}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.medicines}"></td>
                    <td th:text="${p.notes}"></td>

                    <td th:text="${p.appointment.date}"></td>
                    <td th:text="${p.appointment.patient.name}"></td>
                    <td th:text="${p.appointment.doctor.name}"></td>

                    <td>
                        <a th:href="@{/prescriptions/delete/{id}(id=${p.id})}" 
                           class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
