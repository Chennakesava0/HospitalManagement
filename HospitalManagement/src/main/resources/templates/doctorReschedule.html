<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reschedule Appointment</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-warning text-dark">
            <h4>Reschedule Appointment</h4>
        </div>

        <div class="card-body">

            <!-- ❌ Error Message -->
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form action="/appointments/reschedule" method="post">

                <!-- Hidden ID -->
                <input type="hidden" name="id" th:value="${appointment.id}"/>

                <!-- Patient -->
                <div class="mb-3">
                    <label class="form-label">Patient</label>
                    <input type="text" class="form-control"
                           th:value="${appointment.patient.name}" readonly>
                </div>

                <!-- Doctor -->
                <div class="mb-3">
                    <label class="form-label">Doctor</label>
                    <input type="text" class="form-control"
                           th:value="${appointment.doctor.name}" readonly>
                </div>

                <!-- Date -->
                <div class="mb-3">
                    <label class="form-label">New Date</label>
                    <input type="date" name="date" class="form-control" required>
                </div>

                <!-- Time -->
                <div class="mb-3">
                    <label class="form-label">New Time</label>
                    <input type="time" name="time" class="form-control" required>
                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-between">
                    <a href="/doctor/appointments" class="btn btn-secondary">
                        Back
                    </a>

                    <button type="submit" class="btn btn-warning">
                        Update Appointment
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
