<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<title>Appointments</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body class="bg-light">

	<nav class="navbar navbar-dark bg-dark px-3">
		<span class="navbar-brand fs-4">🏥 Hospital Management System</span>
	</nav>

	<div class="container mt-4">

		<div class="d-flex justify-content-between mb-3">
			<a href="/dashboard" class="btn btn-secondary mb-3">⬅ Back to
				Dashboard</a>
			<h3>Appointments</h3>
			<a href="/appointments/add" class="btn btn-warning">+ Book</a>
		</div>

		<div class="card shadow p-3">
			<table class="table table-hover text-center">
				<thead class="table-dark">
					<tr>
						<th>Date</th>
						<th>Time</th>
						<th>Doctor</th>
						<th>Patient</th>
						<th>Action</th>
					</tr>
				</thead>

				<tbody>
					<tr th:each="a : ${appointments}">
						<td th:text="${a.date}"></td>
						<td th:text="${a.time}"></td>
						<td th:text="${a.doctor.name}"></td>
						<td th:text="${a.patient.name}"></td>
						<td><a th:href="@{/appointments/delete/{id}(id=${a.id})}"
							class="btn btn-danger btn-sm">Delete</a> <!-- ✅ Only visible for DOCTOR & ADMIN -->
							<a th:if="${a.status != null and a.status.equals('REJECTED')}"
							th:href="@{'/appointments/reschedule/' + ${a.id}}"
							class="btn btn-warning btn-sm"> Reschedule </a> <span
							th:if="${a.status == null or !a.status.equals('REJECTED')}">-</span>
					</tr>
				</tbody>
			</table>
		</div>

	</div>

</body>
</html>
