<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a href="/dashboard" class="navbar-brand">🏥 HMS</a>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h3>Appointments</h3>
        <a href="/appointments/add" class="btn btn-warning">+ Book</a>
    </div>

    <div class="card shadow p-3">
        <table class="table table-hover text-center">
            <thead class="table-dark">
                <tr>
                    <th>Date</th>
                    <th>Doctor</th>
                    <th>Patient</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="a : ${appointments}">
                    <td th:text="${a.date}"></td>
                    <td th:text="${a.doctor.name}"></td>
                    <td th:text="${a.patient.name}"></td>
                    <td>
                        <a th:href="@{/appointments/delete/{id}(id=${a.id})}" 
                           class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
