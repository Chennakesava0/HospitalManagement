<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Reschedule Appointment</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<!-- Icons -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
	rel="stylesheet">

<style>
body {
	background: linear-gradient(to right, #e3f2fd, #ffffff);
}

.card {
	border-radius: 15px;
}

.card-header {
	border-radius: 15px 15px 0 0;
}

.form-control {
	border-radius: 10px;
}

.btn {
	border-radius: 10px;
}

.info-box {
	background-color: #f8f9fa;
	border-radius: 10px;
	padding: 10px;
}
</style>
</head>

<body>

	<div class="container mt-5">

		<div class="row justify-content-center">
			<div class="col-md-8">

				<div class="card shadow-lg">

					<!-- Header -->
					<div
						class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
						<h4 class="mb-0">
							<i class="bi bi-calendar-event"></i> Reschedule Appointment
						</h4>
						<a th:href="@{/appointments}" class="btn btn-secondary">
							Back </a>
					</div>

					<div class="card-body p-4">

						<!-- Error -->
						<div th:if="${error}" class="alert alert-danger text-center"
							th:text="${error}"></div>

						<form action="/appointments/reschedule" method="post">

							<input type="hidden" name="id" th:value="${appointment.id}" />

							<!-- Info Section -->
							<div class="row mb-4">

								<div class="col-md-6">
									<div class="info-box">
										<label class="fw-bold">👤 Patient</label>
										<p class="mb-0" th:text="${appointment.patient.name}"></p>
									</div>
								</div>

								<div class="col-md-6">
									<div class="info-box">
										<label class="fw-bold">🩺 Doctor</label>
										<p class="mb-0" th:text="${appointment.doctor.name}"></p>
									</div>
								</div>

							</div>

							<div class="row mb-4">

								<div class="col-md-6">
									<div class="info-box">
										<label class="fw-bold">📅 Current Date</label>
										<p class="mb-0" th:text="${appointment.date}"></p>
									</div>
								</div>

								<div class="col-md-6">
									<div class="info-box">
										<label class="fw-bold">⏰ Current Time</label>
										<p class="mb-0" th:text="${appointment.time}"></p>
									</div>
								</div>

							</div>

							<!-- New Inputs -->
							<div class="mb-3">
								<label class="form-label fw-bold">📅 Select New Date</label> <input
									type="date" name="date" class="form-control" required>
							</div>

							<div class="mb-4">
								<label class="form-label fw-bold">⏰ Select New Time</label> <input
									type="time" name="time" class="form-control" required>
							</div>

							<!-- Buttons -->
							<div class="d-grid">
								<button type="submit" class="btn btn-warning btn-lg">
									<i class="bi bi-check-circle"></i> Update Appointment
								</button>
							</div>

						</form>

					</div>

				</div>

			</div>
		</div>

	</div>

</body>
</html>
