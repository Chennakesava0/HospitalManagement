<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reschedule Appointment</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3 shadow">
    <a href="/appointments" class="navbar-brand">
        <i class="bi bi-arrow-left"></i> Back
    </a>
</nav>

<div class="container mt-5">

    <div class="card shadow-lg border-0 col-md-6 mx-auto">

        <!-- Header -->
        <div class="card-header bg-primary text-white text-center">
            <h4 class="mb-0">
                <i class="bi bi-calendar2-check"></i> Reschedule Appointment
            </h4>
        </div>

        <div class="card-body">

            <!-- Error Message -->
            <div th:if="${error}" class="alert alert-danger text-center">
                <span th:text="${error}"></span>
            </div>

            <form action="/appointments/reschedule" method="post">

                <!-- Hidden ID -->
                <input type="hidden" name="id" th:value="${appointment.id}" />

                <!-- Current Details -->
                <h6 class="text-secondary mb-3">Current Appointment Details</h6>

                <div class="mb-3">
                    <label class="form-label">Doctor</label>
                    <input type="text" class="form-control bg-light"
                           th:value="${appointment.doctor.name}" readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label">Patient</label>
                    <input type="text" class="form-control bg-light"
                           th:value="${appointment.patient.name}" readonly>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Current Date</label>
                        <input type="text" class="form-control bg-light"
                               th:value="${appointment.date}" readonly>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Current Time</label>
                        <input type="text" class="form-control bg-light"
                               th:value="${appointment.time}" readonly>
                    </div>
                </div>

                <hr>

                <!-- New Slot -->
                <h6 class="text-primary mb-3">Select New Slot</h6>

                <div class="mb-3">
                    <label class="form-label">New Date</label>
                    <input type="date" name="date"
                           class="form-control"
                           th:attr="min=${T(java.time.LocalDate).now()}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">New Time</label>
                    <input type="time" name="time"
                           class="form-control"
                           required>
                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-between mt-4">
                    <a href="/appointments" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle"></i> Cancel
                    </a>

                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-circle"></i> Update Appointment
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
