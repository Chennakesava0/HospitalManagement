<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Doctor Appointments</title>

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<!-- Icons -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
	rel="stylesheet">

</head>

<body class="bg-light">

	<!-- 🔷 Navbar -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
		<div class="container-fluid">
			<span class="navbar-brand"> <i class="bi bi-hospital"></i>
				Doctor Panel
			</span>

			<div>
				<a href="/doctor/dashboard" class="btn btn-outline-light btn-sm">
					<i class="bi bi-arrow-left"></i> Back
				</a>
			</div>
		</div>
	</nav>

	<!-- 🔷 Content -->
	<div class="container mt-4">

		<!-- Page Title -->
		<div class="d-flex justify-content-between align-items-center mb-3">
			<h3 class="fw-bold">Appointments</h3>
		</div>

		<!-- 🔷 Card -->
		<div class="card shadow rounded-3">
			<div class="card-body">

				<!-- If no appointments -->
				<div th:if="${#lists.isEmpty(appointments)}" class="text-center p-4">
					<i class="bi bi-calendar-x fs-1 text-muted"></i>
					<p class="mt-2 text-muted">No appointments found</p>
				</div>

				<!-- Table -->
				<div th:if="${!#lists.isEmpty(appointments)}">
					<table class="table table-hover align-middle">

						<thead class="table-dark">
							<tr>
								<th>Patient</th>
								<th>Date</th>
								<th>Time</th>
								<th>Status</th>
								<th class="text-center">Actions</th>
							</tr>
						</thead>

						<tbody>
							<tr th:each="a : ${appointments}">

								<td><i class="bi bi-person-circle text-primary"></i> <span
									th:text="${a.patient.name}"></span></td>

								<td th:text="${a.date}"></td>

								<td><span class="badge bg-secondary" th:text="${a.time}"></span>
								</td>

								<!-- Status Badge -->
								<td><span th:if="${a.status == 'PENDING'}"
									class="badge bg-warning text-dark">Pending</span> <span
									th:if="${a.status == 'APPROVED'}" class="badge bg-success">Approved</span>

									<span th:if="${a.status == 'REJECTED'}" class="badge bg-danger">Rejected</span>
								</td>

								<!-- Actions -->
								<td class="text-center"><a
									th:href="@{'/email/approve/' + ${a.id}}"
									class="btn btn-success"> Allow </a> <a
									th:href="@{'/email/reject/' + ${a.id}}" class="btn btn-danger">
										Reject </a>  </a>
							</tr>
						</tbody>

					</table>
				</div>

			</div>
		</div>

	</div>

</body>
</html>
