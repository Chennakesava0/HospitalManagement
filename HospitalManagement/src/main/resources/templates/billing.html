<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Billing</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f7fc; }

        .card {
            border-radius: 15px;
        }

        .table th {
            background-color: #212529;
            color: white;
        }

        .paid { color: green; font-weight: bold; }
        .pending { color: red; font-weight: bold; }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <a href="/dashboard" class="navbar-brand">🏥 HMS</a>
</nav>

<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between mb-4">
        <h3 class="fw-bold">Billing Details</h3>
        <a href="/billing/add" class="btn btn-danger">
            + Add Bill
        </a>
    </div>

    <!-- Table -->
    <div class="card shadow p-3">

        <div class="table-responsive">
            <table class="table table-hover text-center align-middle">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Date</th>
                        <th>Consultation Fee</th>
                        <th>Medicine Cost</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="b : ${billings}">
                        <td th:text="${b.id}"></td>

                        <td th:text="${b.appointment.patient.name}"></td>
                        <td th:text="${b.appointment.doctor.name}"></td>
                        <td th:text="${b.billDate}"></td>

                        <td th:text="${b.consultationFee}"></td>
                        <td th:text="${b.medicineCost}"></td>
                        <td th:text="${b.totalAmount}"></td>

                        <td>
                            <span th:text="${b.paymentStatus}"
                                  th:classappend="${b.paymentStatus == 'PAID'} ? 'paid' : 'pending'">
                            </span>
                        </td>

                        <td>
                            <a th:href="@{/billing/delete/{id}(id=${b.id})}"
                               class="btn btn-sm btn-danger">
                                Delete
                            </a>
                        </td>
                    </tr>

                </tbody>

            </table>
        </div>

    </div>

</div>

</body>
</html>
