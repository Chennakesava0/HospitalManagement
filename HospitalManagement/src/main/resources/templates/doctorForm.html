<!DOCTYPE html>
<html>
<head>
    <title>Add Doctor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a href="/doctors" class="navbar-brand">← Back</a>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4 col-md-6 mx-auto">
        <h4 class="text-center mb-3">Add Doctor</h4>

        <form action="/doctors/save" method="post">

            <input type="text" name="name" placeholder="Name" class="form-control mb-3">
            <input type="text" name="specialization" placeholder="Specialization" class="form-control mb-3">
            <input type="number" name="experience" placeholder="Experience" class="form-control mb-3">

            <button class="btn btn-success w-100">Save</button>

        </form>
    </div>

</div>

</body>
</html>
