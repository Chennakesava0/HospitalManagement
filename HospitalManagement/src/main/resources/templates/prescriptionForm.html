<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Prescription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a href="/prescriptions" class="navbar-brand">← Back</a>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4 col-md-6 mx-auto">
        <h4 class="text-center mb-3">Add Prescription</h4>

        <form action="/prescriptions/save" method="post">

            <!-- Medicines -->
            <div class="mb-3">
                <label>Medicines</label>
                <input type="text" name="medicines" class="form-control" placeholder="Enter medicines">
            </div>

            <!-- Notes -->
            <div class="mb-3">
                <label>Notes</label>
                <textarea name="notes" class="form-control" placeholder="Enter notes"></textarea>
            </div>

            <!-- Appointment Dropdown -->
            <div class="mb-3">
                <label>Select Appointment</label>
                <select name="appointment.id" class="form-control">
                    <option value="">-- Select Appointment --</option>

                    <option th:each="a : ${appointments}"
                            th:value="${a.id}"
                            th:text="'Date: ' + ${a.date} + ' | Patient: ' + ${a.patient.name} + ' | Doctor: ' + ${a.doctor.name}">
                    </option>
                </select>
            </div>

            <button class="btn btn-success w-100">Save Prescription</button>

        </form>
    </div>

</div>

</body>
</html>
