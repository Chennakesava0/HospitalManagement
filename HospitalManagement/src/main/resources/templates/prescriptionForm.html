<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Prescription</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fc;
        }

        .card {
            border-radius: 15px;
        }

        .form-control, .form-select {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <a href="/prescriptions" class="navbar-brand">← Back</a>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4 col-md-6 mx-auto">

        <h4 class="text-center mb-4 fw-bold">Add Prescription</h4>

        <form th:action="@{/prescriptions/save}" 
              th:object="${prescription}" 
              method="post">

            <!-- Medicines -->
            <div class="mb-3">
                <label class="form-label">Medicines</label>
                <input type="text" th:field="*{medicines}"
                       class="form-control"
                       placeholder="Enter medicines"
                       required>
            </div>

            <!-- Notes -->
            <div class="mb-3">
                <label class="form-label">Notes</label>
                <textarea th:field="*{notes}"
                          class="form-control"
                          rows="3"
                          placeholder="Enter notes"></textarea>
            </div>

            <!-- Appointment Dropdown -->
            <div class="mb-3">
                <label class="form-label">Select Appointment</label>

                <select th:field="*{appointment.id}" class="form-select" required>

                    <option value="">-- Select Appointment --</option>

                    <option th:each="a : ${appointments}"
                            th:value="${a.id}"
                            th:text="'Date: ' + ${a.date} + 
                                     ' | Patient: ' + ${a.patient.name} + 
                                     ' | Doctor: ' + ${a.doctor.name}">
                    </option>

                </select>
            </div>

            <!-- Button -->
            <button class="btn btn-success w-100">
                Save Prescription
            </button>

        </form>

    </div>

</div>

</body>
</html>
