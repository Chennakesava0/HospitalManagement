<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f4f7fc; }
        .card { border-radius: 15px; }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <a href="/patients" class="navbar-brand">← Back</a>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4 col-md-6 mx-auto">
        <h4 class="text-center mb-3">Add Patient</h4>

        <form th:action="@{/patients/save}" method="post" th:object="${patient}">

            <input type="text" th:field="*{name}" placeholder="Name" class="form-control mb-3" required>
<input type="number" th:field="*{age}" placeholder="Age" class="form-control mb-3">
            <select th:field="*{gender}" class="form-control mb-3">
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
</select>

            <input type="text" th:field="*{phone}" placeholder="Phone" class="form-control mb-3">
            <input type="text" th:field="*{disease}" placeholder="Disease" class="form-control mb-3">

            <button class="btn btn-success w-100">Save Patient</button>

        </form>
    </div>

</div>

</body>
</html>
