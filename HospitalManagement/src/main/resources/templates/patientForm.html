<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a href="/patients" class="navbar-brand">← Back</a>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4 col-md-6 mx-auto">
        <h4 class="text-center mb-3">Add Patient</h4>

        <form action="/patients/save" method="post">

            <input type="text" name="name" placeholder="Name" class="form-control mb-3">
            <input type="number" name="age" placeholder="Age" class="form-control mb-3">
            <input type="text" name="gender" placeholder="Gender" class="form-control mb-3">
            <input type="text" name="phone" placeholder="Phone" class="form-control mb-3">
            <input type="email" name="email" placeholder="Email" class="form-control mb-3">

            <button class="btn btn-success w-100">Save</button>

        </form>
    </div>

</div>

</body>
</html>
