<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Billing</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f7fc; }

        .card {
            border-radius: 15px;
        }

        .form-control, .form-select {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <a href="/billing" class="navbar-brand">← Back</a>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4 col-md-6 mx-auto">

        <h4 class="text-center mb-4 fw-bold">Add Billing</h4>

        <form th:action="@{/billing/save}" 
              th:object="${billing}" 
              method="post">

            <!-- Appointment -->
            <div class="mb-3">
                <label>Select Appointment</label>

                <select th:field="*{appointment.id}" class="form-select" required>
                    <option value="">-- Select Appointment --</option>

                    <option th:each="a : ${appointments}"
                            th:value="${a.id}"
                            th:text="'Date: ' + ${a.date} + 
                                     ' | Patient: ' + ${a.patient.name} + 
                                     ' | Doctor: ' + ${a.doctor.name}">
                    </option>
                </select>
            </div>

            <!-- Consultation Fee -->
            <input type="number" step="0.01"
                   th:field="*{consultationFee}"
                   placeholder="Consultation Fee"
                   class="form-control mb-3" required>

            <!-- Medicine Cost -->
            <input type="number" step="0.01"
                   th:field="*{medicineCost}"
                   placeholder="Medicine Cost"
                   class="form-control mb-3" required>

            <!-- Total Amount -->
            <input type="number" step="0.01"
                   th:field="*{totalAmount}"
                   placeholder="Total Amount"
                   class="form-control mb-3" required>

            <!-- Payment Status -->
            <select th:field="*{paymentStatus}" class="form-select mb-3">
                <option value="">Select Status</option>
                <option value="PAID">PAID</option>
                <option value="PENDING">PENDING</option>
            </select>

            <!-- Bill Date -->
            <input type="date"
                   th:field="*{billDate}"
                   class="form-control mb-3" required>

            <!-- Button -->
            <button class="btn btn-danger w-100">
                Save Bill
            </button>

        </form>

    </div>

</div>

</body>
</html>
