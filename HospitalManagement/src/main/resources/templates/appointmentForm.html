<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a href="/appointments" class="navbar-brand">← Back</a>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4 col-md-6 mx-auto">
        <h4 class="text-center mb-3">Book Appointment</h4>

        <form action="/appointments/save" method="post">

            <input type="date" name="date" class="form-control mb-3">
            <input type="time" name="time" class="form-control mb-3">

            <select name="doctor.id" class="form-control mb-3">
                <option th:each="d : ${doctors}" 
                        th:value="${d.id}" 
                        th:text="${d.name}">
                </option>
            </select>

            <select name="patient.id" class="form-control mb-3">
                <option th:each="p : ${patients}" 
                        th:value="${p.id}" 
                        th:text="${p.name}">
                </option>
            </select>

            <button class="btn btn-success w-100">Book</button>

        </form>
    </div>

</div>

</body>
</html>
