<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a href="/appointments" class="navbar-brand">← Back</a>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4 col-md-6 mx-auto">
        <h4 class="text-center mb-3">Book Appointment</h4>

        <form action="/appointments/save" method="post">

    <!-- Date Picker (Calendar) -->
    <input type="date" id="date" name="date" class="form-control mb-3" onchange="showDetails()">

    <!-- Time Picker -->
    <input type="time" id="time" name="time" class="form-control mb-3" onchange="showDetails()">

    <!-- Doctor Dropdown -->
    <select id="doctor" name="doctor.id" class="form-control mb-3" onchange="showDetails()">
        <option value="">Select Doctor</option>
        <option th:each="d : ${doctors}"
                th:value="${d.id}"
                th:text="${d.name}">
        </option>
    </select>

    <!-- Patient Dropdown -->
    <select id="patient" name="patient.id" class="form-control mb-3" onchange="showDetails()">
        <option value="">Select Patient</option>
        <option th:each="p : ${patients}"
                th:value="${p.id}"
                th:text="${p.name}">
        </option>
    </select>

    <input type="email" name="email" class="form-control mb-3" placeholder="Enter Patient Email" required>

    <button class="btn btn-success w-100">Book</button>

</form>

<script>
function showDetails() {

    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;

    let doctorSelect = document.getElementById("doctor");
    let doctorText = doctorSelect.options[doctorSelect.selectedIndex].text;

    let patientSelect = document.getElementById("patient");
    let patientText = patientSelect.options[patientSelect.selectedIndex].text;
}
   
</script>    </div>

</div>

</body>
</html>
