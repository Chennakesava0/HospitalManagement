<!DOCTYPE html>
<html>
<head>
    <title>Patients</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f4f7fc; }
        .card { border-radius: 15px; }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fs-4">🏥 Hospital Management System</span>
    <a href="/logout" class="btn btn-outline-light">Logout</a>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
    <a href="/dashboard" class="btn btn-secondary mb-3">⬅ Back to Dashboard</a>
        <h3 class="fw-bold">Patients List</h3>
        <a href="/patients/add" class="btn btn-primary">+ Add Patient</a>
    </div>

    <div class="card shadow p-3">
        <table class="table table-hover text-center">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Phone</th>
                    <th>Disease</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="p : ${patients}">
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.age}"></td>
                    <td th:text="${p.gender}"></td>
                    <td th:text="${p.phone}"></td>
                    <td th:text="${p.disease}"></td>
                    <td>
                        <a th:href="@{/patients/delete/{id}(id=${p.id})}" 
                           class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
