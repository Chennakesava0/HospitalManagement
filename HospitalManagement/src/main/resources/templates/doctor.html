<!DOCTYPE html>
<html>
<head>
    <title>Doctors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand fs-4">🏥 Hospital Management System</span>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
    <a href="/dashboard" class="btn btn-secondary mb-3">⬅ Back to Dashboard</a>
        <h3>Doctors</h3>
        <a href="/doctors/add" class="btn btn-success">+ Add Doctor</a>
    </div>

    <div class="card shadow p-3">
        <table class="table table-hover text-center">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Specialization</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="d : ${doctors}">
                    <td th:text="${d.name}"></td>
                    <td th:text="${d.specialization}"></td>
                    <td>
                        <a th:href="@{/doctors/delete/{id}(id=${d.id})}" 
                           class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
